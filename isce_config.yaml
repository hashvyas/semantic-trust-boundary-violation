# isce_config.yaml
# Central configuration for the ISCE STB V2X Security Pipeline.
# This file is consumed by pipeline blocks (B1, B2, B3, …).
#
# References:
#   ETSI EN 302 637-2 (CAM)
#   ETSI EN 302 637-3 (DENM)
#   ETSI TS 102 894-2  (ITS-AID / PSID registry)
#   ETSI TS 103 900    (ITS station types)

# ---------------------------------------------------------------------------
# ETSI ITS Station Type Enumeration
# Integer values match ETSI TS 103 900 / EN 302 895 StationType.
# ---------------------------------------------------------------------------
station_types:
  unknown:          0
  pedestrian:       1
  cyclist:          2
  moped:            3
  motorcycle:       4
  passengerCar:     5
  bus:              6
  lightTruck:       7
  heavyTruck:       8
  trailer:          9
  specialVehicle:   10
  tram:             11
  lightVruVehicle:  12   # e-scooter, e-bike, etc.
  animal:           13
  agricultural:     14
  roadSideUnit:     15

# ---------------------------------------------------------------------------
# Recognised ITS Message Types (message_id values as per ETSI EN 302 637-x)
# ---------------------------------------------------------------------------
message_types:
  CAM:    1    # Cooperative Awareness Message
  DENM:   2    # Decentralised Environmental Notification Message
  MAPEM:  5    # MAP Extended Message
  SPATEM: 6    # Signal Phase And Timing Message
  SREM:   7    # Signal Request Extended Message
  SSEM:   8    # Signal Status Extended Message
  IVIM:   11   # Infrastructure to Vehicle Information Message
  EVCSN:  15   # Electric Vehicle Charging Spot Notification
  SAEM:   16   # Service Announcement Extended Message
  RTCMEM: 28   # RTCM Extended Message (GNSS correction data)

# ---------------------------------------------------------------------------
# B1 – Sender Certificate Semantic Validation (SCSV) policy
#
# Each rule has:
#   station_type  – string key from station_types above, or "*" (wildcard)
#   message_type  – string key from message_types above, or "*" (wildcard)
#   action        – "allow" | "block"
#   score         – float 0.0–1.0 returned by SCSV.check()
#                   (allow → 1.0, block → 0.0 by convention; can be fractional
#                    for future confidence-weighted rules)
#   note          – human-readable rationale (optional)
#
# Rules are evaluated top-to-bottom; the first matching rule wins.
# If no rule matches, default_policy applies.
# ---------------------------------------------------------------------------
b1_scsv:

  default_policy: block   # "allow" or "block" — fail-closed: unknown combinations are blocked

  rules:

    # ── Passenger vehicles (ITS-S on-board) ──────────────────────────────
    - station_type: passengerCar
      message_type: CAM
      action: allow
      score: 1.0
      note: "Normal CAM broadcast from a passenger vehicle – expected traffic."

    - station_type: passengerCar
      message_type: DENM
      action: allow
      score: 1.0
      note: "Passenger cars may issue DENMs for hazard warnings."

    - station_type: passengerCar
      message_type: SREM
      action: block
      score: 0.0
      note: "SREM is reserved for roadside / infrastructure; a car sending it is suspicious."

    - station_type: passengerCar
      message_type: SPATEM
      action: block
      score: 0.0
      note: "SPATEM is an RSU/infrastructure message; passenger cars must not originate it."

    - station_type: passengerCar
      message_type: MAPEM
      action: block
      score: 0.0
      note: "MAPEM is an RSU/infrastructure message; passenger cars must not originate it."

    # ── Other road vehicles ───────────────────────────────────────────────
    - station_type: bus
      message_type: CAM
      action: allow
      score: 1.0
      note: "Bus broadcasting its position – normal V2X traffic."

    - station_type: bus
      message_type: DENM
      action: allow
      score: 1.0
      note: "Bus issuing DENM hazard alert."

    - station_type: bus
      message_type: SPATEM
      action: block
      score: 0.0
      note: "SPATEM must not originate from a bus."

    - station_type: lightTruck
      message_type: CAM
      action: allow
      score: 1.0
      note: "Light truck broadcasting position via CAM – normal V2X traffic."

    - station_type: lightTruck
      message_type: DENM
      action: allow
      score: 1.0
      note: "Light truck issuing DENM hazard alert."

    - station_type: heavyTruck
      message_type: CAM
      action: allow
      score: 1.0
      note: "Heavy truck broadcasting position via CAM – normal V2X traffic."

    - station_type: heavyTruck
      message_type: DENM
      action: allow
      score: 1.0
      note: "Heavy truck issuing DENM hazard alert."

    - station_type: motorcycle
      message_type: CAM
      action: allow
      score: 1.0
      note: "Motorcycle broadcasting position via CAM – normal VRU traffic."

    - station_type: motorcycle
      message_type: DENM
      action: allow
      score: 1.0
      note: "Motorcycle issuing DENM hazard alert."

    - station_type: moped
      message_type: CAM
      action: allow
      score: 1.0
      note: "Moped (VRU) broadcasting position via CAM – normal V2X traffic."

    - station_type: cyclist
      message_type: CAM
      action: allow
      score: 1.0
      note: "Cyclist (VRU) broadcasting position via CAM – normal V2X traffic."

    - station_type: pedestrian
      message_type: CAM
      action: allow
      score: 1.0
      note: "Pedestrian VRU device sending CAM – allowed."

    - station_type: pedestrian
      message_type: SPATEM
      action: block
      score: 0.0
      note: "A pedestrian device must not originate SPATEM."

    - station_type: tram
      message_type: CAM
      action: allow
      score: 1.0
      note: "Tram broadcasting position via CAM – normal public-transport V2X traffic."

    - station_type: specialVehicle
      message_type: CAM
      action: allow
      score: 1.0
      note: "Special vehicle (emergency/utility) broadcasting position via CAM."

    - station_type: specialVehicle
      message_type: DENM
      action: allow
      score: 1.0
      note: "Special vehicle issuing DENM hazard or incident notification."

    - station_type: agricultural
      message_type: CAM
      action: allow
      score: 1.0
      note: "Agricultural vehicle broadcasting position via CAM."

    - station_type: trailer
      message_type: CAM
      action: allow
      score: 1.0
      note: "Trailer broadcasting position via CAM (tractor-unit equipped ITS-S)."

    - station_type: lightVruVehicle
      message_type: CAM
      action: allow
      score: 1.0
      note: "Light VRU vehicle (e-scooter, e-bike) broadcasting position via CAM."

    - station_type: animal
      message_type: CAM
      action: allow
      score: 1.0
      note: "Animal-tag ITS-S broadcasting position via CAM."

    # ── Infrastructure-only message types blocked for road vehicles ───────
    - station_type: passengerCar
      message_type: RTCMEM
      action: block
      score: 0.0
      note: "RTCMEM (GNSS correction data) is infrastructure-only; a passenger car originating it is anomalous."

    - station_type: bus
      message_type: RTCMEM
      action: block
      score: 0.0
      note: "RTCMEM (GNSS correction data) is infrastructure-only; a bus originating it is anomalous."

    - station_type: passengerCar
      message_type: IVIM
      action: block
      score: 0.0
      note: "IVIM (Infrastructure to Vehicle Information) must originate from infrastructure, not a passenger car."

    - station_type: bus
      message_type: IVIM
      action: block
      score: 0.0
      note: "IVIM must originate from infrastructure, not a bus."

    - station_type: passengerCar
      message_type: EVCSN
      action: block
      score: 0.0
      note: "EVCSN (EV Charging Spot Notification) is a charging-operator message; a passenger car must not originate it."

    - station_type: bus
      message_type: EVCSN
      action: block
      score: 0.0
      note: "EVCSN is a charging-operator message; a bus must not originate it."

    - station_type: passengerCar
      message_type: SAEM
      action: block
      score: 0.0
      note: "SAEM (Service Announcement) is an infrastructure/operator message; a passenger car must not originate it."

    - station_type: bus
      message_type: SAEM
      action: block
      score: 0.0
      note: "SAEM is an infrastructure/operator message; a bus must not originate it."

    # ── Road-Side Unit (infrastructure) – wildcard ────────────────────────
    - station_type: roadSideUnit
      message_type: "*"
      action: allow
      score: 1.0
      note: "RSUs are trusted infrastructure; any message type is permitted."

    # ── Unknown station type ──────────────────────────────────────────────
    - station_type: unknown
      message_type: "*"
      action: block
      score: 0.0
      note: "Station type 0 (unknown) – identity unverifiable; block all."

# ---------------------------------------------------------------------------
# B2 – Cluster Semantic Invariance Analysis (CSIA) – Research Grade v2
#
# Four-stage pipeline:
#   1. Spatio-Temporal Pre-Clustering  (Haversine radius + sliding ns window)
#   2a. Kinematic Engine               (Mahalanobis / Weighted Euclidean)
#   2b. CAM Semantic Engine            (Hamming similarity on categorical fields)
#   3.  Temporal Entropy Engine        (Shannon entropy of inter-arrival times)
#   4.  Score Fusion                   (weighted sum → [0.0, 1.0])
#
# Score convention (same as B1):
#   0.0  → highly suspicious / coordinated attack detected
#   1.0  → benign / messages appear kinematically independent
#
# References:
#   ETSI TR 103 460  – Misbehaviour Detection in ITS
#   ETSI EN 302 637-2 – Cooperative Awareness Message (CAM) specification
# ---------------------------------------------------------------------------
b2_csia:

  # ── Cluster formation ────────────────────────────────────────────────────
  # Minimum number of messages in a spatio-temporal cluster to run analysis.
  # Clusters smaller than this are dropped; if no cluster qualifies, 1.0 is
  # returned (insufficient data → benign).
  min_cluster_size: 3

  # Haversine spatial radius (metres) for grouping messages into neighbourhoods.
  # Two messages are spatially adjacent if their Haversine distance < radius.
  spatial_radius_m: 100.0

  # Observation window duration in nanoseconds.  Two messages are temporally
  # adjacent if |Δtimestamp| ≤ window_size_ns.
  # 1 000 000 000 ns = 1 second.  Timestamps in the CAM field
  # generation_delta_time are in milliseconds; use ns-unit values when testing
  # for meaningful temporal scoring.
  window_size_ns: 1000000000

  # ── Position & timestamp routing fields ──────────────────────────────────
  # These dot-paths are used *only* for cluster formation – they are NOT part
  # of the kinematic feature vector.
  position_lat_field: "cam.cam_parameters.basic_container.reference_position.latitude"
  position_lon_field: "cam.cam_parameters.basic_container.reference_position.longitude"
  timestamp_field:    "cam.generation_delta_time"

  # ── Kinematic feature fields (Stage 2a engine) ───────────────────────────
  # Dot-paths extracted into the kinematic feature vector.
  # Missing fields default to 0.0 (safe degradation).
  kinematic_fields:
    - "cam.cam_parameters.high_frequency_container.basic_vehicle_container_high_frequency.speed"
    - "cam.cam_parameters.high_frequency_container.basic_vehicle_container_high_frequency.heading"
    - "cam.cam_parameters.high_frequency_container.basic_vehicle_container_high_frequency.yaw_rate"
    - "cam.cam_parameters.high_frequency_container.basic_vehicle_container_high_frequency.steering_wheel_angle"
    - "cam.cam_parameters.high_frequency_container.basic_vehicle_container_high_frequency.lateral_acceleration"
    - "cam.cam_parameters.high_frequency_container.basic_vehicle_container_high_frequency.longitudinal_acceleration"

  # ── CAM semantic / structural fields (Stage 2b Hamming engine) ───────────
  # Raw categorical values.  Identical fingerprints across distinct station_ids
  # in the same cluster raise suspicion.
  semantic_fields:
    - "cam.cam_parameters.basic_container.station_type"
    - "header.station_id"

  # ── Mahalanobis distance settings ────────────────────────────────────────
  # Minimum cluster size to attempt Mahalanobis distance.  Below this, or when
  # the covariance matrix is singular (condition > 1e12), falls back to plain
  # Euclidean on the robust-scaled data (equivalent to Weighted Euclidean in the
  # original feature space).
  mahalanobis_min_samples: 4

  # ── Robust scaling fallback IQR denominators ─────────────────────────────
  # When IQR = 0 for a column (zero-variance feature), the fallback_range
  # provides a reference denominator so the scaled value stays bounded.
  # Keys match kinematic_fields entries exactly.
  fallback_ranges:
    "cam.cam_parameters.high_frequency_container.basic_vehicle_container_high_frequency.speed":                   16383   # 0.01 m/s; max CAM speed
    "cam.cam_parameters.high_frequency_container.basic_vehicle_container_high_frequency.heading":                 3600    # 0.1°; 0–360°
    "cam.cam_parameters.high_frequency_container.basic_vehicle_container_high_frequency.yaw_rate":                32766   # 0.01 °/s; ±163.83°/s
    "cam.cam_parameters.high_frequency_container.basic_vehicle_container_high_frequency.steering_wheel_angle":    1023    # 0.1°; ±51.1° range
    "cam.cam_parameters.high_frequency_container.basic_vehicle_container_high_frequency.lateral_acceleration":    2000    # 0.01 m/s²; ±20 m/s²
    "cam.cam_parameters.high_frequency_container.basic_vehicle_container_high_frequency.longitudinal_acceleration": 2000  # 0.01 m/s²; ±20 m/s²

  # ── Adaptive kinematic distance thresholds ───────────────────────────────
  # Highway (median cluster speed ≥ highway_speed_threshold) uses a tighter
  # threshold; city grids use a wider one.
  # Units: Euclidean distance in robust-scaled feature space (dimensionless).
  highway_speed_threshold:      2000    # 0.01 m/s → 20 m/s = 72 km/h
  highway_kinematic_threshold:  0.20    # tight — highway uniformity is expected;
                                        # clones must be < this to be flagged
  city_kinematic_threshold:     0.50    # wider — city traffic is naturally diverse
  kinematic_cap_multiplier:     6.0     # trust = 1.0 at distance = threshold × cap

  # ── Temporal entropy (Stage 3 engine) ────────────────────────────────────
  # Number of bins for the inter-arrival time histogram.
  temporal_entropy_bins: 8

  # ── Score fusion weights (must sum to 1.0) ───────────────────────────────
  weight_kinematic: 0.55   # dominant: kinematic coherence is the primary signal
  weight_semantic:  0.20   # structural CAM fingerprint similarity
  weight_timing:    0.25   # transmission inter-arrival entropy


# ---------------------------------------------------------------------------
# B1 V2 – Stateful hardening extensions
#
# These keys are optional for backward compatibility. When absent, the
# stateful extensions use the defaults shown below.
# ---------------------------------------------------------------------------

# Replay cache: entries expire after this many seconds.
b1_replay_cache_ttl_s: 30

# Timestamp freshness: messages whose generation_delta_time is more than
# this many milliseconds old (relative to system wall clock) are rejected.
b1_timestamp_freshness_ms: 5000

# Certificate rotation: if a vehicle changes its certificate identifier
# more than b1_cert_max_rotations times within b1_cert_rotation_window_s
# seconds, the message is flagged as a certificate-rotation anomaly.
b1_cert_rotation_window_s: 60
b1_cert_max_rotations: 3

# Physical plausibility thresholds (ETSI native units).
# speed: 0.01 m/s,  acceleration: 0.01 m/s²,  heading: 0.1°
# yaw_rate: 0.01 °/s,  coordinates: 1e-7 degrees
b1_plausibility:
  max_speed_etsi:               8330       # 83.3 m/s = 300 km/h
  max_acceleration_etsi:        1500       # 15 m/s²
  max_jerk_etsi:                3000       # 30 m/s³ (per frame delta)
  max_heading_change_etsi:      900        # 90 degrees per second (0.1 deg units)
  max_yaw_rate_etsi:            7500       # 75 deg/s (0.01 deg/s units)
  lat_min:                      -900000000
  lat_max:                       900000000
  lon_min:                      -1800000000
  lon_max:                       1800000000

# ---------------------------------------------------------------------------
# B2 V2 – Trust evolution and vehicle-type kinematic profiles
#
# These keys are optional. When absent the V2 extensions fall back to the
# built-in defaults defined in b2_csia/models.py.
# ---------------------------------------------------------------------------

# Exponential trust decay rate per suspicious observation.  Range (0, 1).
b2_trust_decay_alpha: 0.10

# Gradual trust recovery rate per benign observation.  Range (0, 1).
b2_trust_recovery_beta: 0.05

# Maximum number of trust observations retained per vehicle in memory.
b2_trust_history_window: 20

# Per-vehicle kinematic profiles.  Override the built-in model defaults.
# station_type integers match the ETSI station_types enum defined above.
b2_vehicle_profiles:

  passenger_car:
    station_type:           5
    max_acceleration:       8.0
    max_deceleration:       12.0
    max_yaw_rate:           45.0
    expected_update_hz:     10.0
    heading_tolerance:      5.0
    max_speed:              55.6

  bus:
    station_type:           6
    max_acceleration:       3.5
    max_deceleration:       8.0
    max_yaw_rate:           25.0
    expected_update_hz:     5.0
    heading_tolerance:      3.0
    max_speed:              33.3

  heavy_truck:
    station_type:           8
    max_acceleration:       3.0
    max_deceleration:       7.0
    max_yaw_rate:           20.0
    expected_update_hz:     5.0
    heading_tolerance:      3.0
    max_speed:              36.1

  light_truck:
    station_type:           7
    max_acceleration:       5.0
    max_deceleration:       9.0
    max_yaw_rate:           30.0
    expected_update_hz:     5.0
    heading_tolerance:      4.0
    max_speed:              44.4

  motorcycle:
    station_type:           4
    max_acceleration:       10.0
    max_deceleration:       15.0
    max_yaw_rate:           90.0
    expected_update_hz:     10.0
    heading_tolerance:      10.0
    max_speed:              83.3

  rsu:
    station_type:           15
    max_acceleration:       0.0
    max_deceleration:       0.0
    max_yaw_rate:           0.0
    expected_update_hz:     1.0
    heading_tolerance:      0.0
    max_speed:              0.0

  pedestrian:
    station_type:           1
    max_acceleration:       3.0
    max_deceleration:       5.0
    max_yaw_rate:           180.0
    expected_update_hz:     2.0
    heading_tolerance:      30.0
    max_speed:              3.0

# ---------------------------------------------------------------------------
# Transition to B3 decision layer: B1 Validation Scoring and Penalties
# ---------------------------------------------------------------------------
validation:
  fatal:
    malformed_json: true
    invalid_schema: true
    parser_failure: true
    invalid_coordinates: true
    impossible_speed: true
    impossible_acceleration: true
    invalid_heading: true
    invalid_numeric_values: true
  penalties:
    replay: 0.30
    stale_timestamp: 0.20
    certificate_rotation: 0.15
  minimum_validation_score: 0.40

# ---------------------------------------------------------------------------
# B3 Semantic Gate Model Configuration
# ---------------------------------------------------------------------------
b3_semantic_gate:
  model_path: "b3/solution_stb/b3_semantic_gate/model/semantic_gate_v3"
  max_length: 256
  batch_size: 32
  device: null  # auto-detects cuda/cpu when null
  malicious_labels: ["MALICIOUS", "MALICIOUS_SEMANTIC_MANIPULATION"]
  risk_thresholds:
    high: 0.85    # confidence >= this on a malicious label -> risk_level="high"
    medium: 0.60  # confidence >= this (below high) -> risk_level="medium"
                  # confidence below "medium" on a malicious label -> risk_level="low"
